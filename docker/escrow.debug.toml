# ⚠️  DEBUG / DEMO CONFIGURATION — DO NOT USE IN PRODUCTION
# Known credentials: admin / escrow
# All 7 ecosystems enabled, full policy active, verbose logging.

[server]
  host      = "0.0.0.0"
  port      = 7888
  log_level = "debug"

[storage]
  backend = "disk"
  [storage.disk]
    path = "./escrow-cache"

[ecosystems]
  npm      = true
  pypi     = true
  go       = true
  cargo    = true
  composer = true
  nuget    = true
  maven    = true

[policy]
  [policy.age]
    min_days = 7
    action   = "block"

  [policy.osv]
    min_severity = "MEDIUM"
    action       = "block"

  [policy.publisher]
    max_account_age_days = 30
    action               = "warn"

  [policy.popularity]
    spike_factor = 10.0
    action       = "warn"

[dashboard]
  enabled  = true
  path     = "/dashboard"
  username = "admin"
  password = "escrow"
  secret   = "debug-secret-do-not-use-in-production-32ch"

[alerts]
  webhook_url = ""

allowlist_path = "escrow-allowlist.json"
blocklist_path = "escrow-blocklist.json"
eventlog_path  = "escrow-events.jsonl"
