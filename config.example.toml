[server]
  host      = "0.0.0.0"
  port      = 8888
  log_level = "info"   # debug | info | warn | error

[ecosystems]
  npm  = true
  pypi = true

[storage]
  backend = "disk"   # disk | s3 | memory

  [storage.disk]
    path = "./escrow-cache"

  [storage.s3]
    bucket   = ""
    region   = "eu-west-1"
    endpoint = ""   # blank = AWS; set for MinIO

[policy]
  [policy.age]
    min_days = 7
    action   = "block"   # block | warn | allow

  [policy.osv]
    min_severity = "MEDIUM"   # LOW | MEDIUM | HIGH | CRITICAL
    action       = "block"

  [policy.publisher]
    max_account_age_days = 30
    action               = "warn"

  [policy.popularity]
    spike_factor = 10.0
    action       = "warn"

  [policy.pypi]
    block_sdist = false

[alerts]
  webhook_url = ""
